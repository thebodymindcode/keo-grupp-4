<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KEO GROUP, проектирование, легализация и регистрация коммерческой недвижимости в Москве</title>
<meta name="description" content="KEO GROUP: полный цикл по коммерческой недвижимости в Москве. Реконструкция, легализация 819-ПП, КРТ, Росреестр, ДГИ, смена ВРИ. 15+ лет, 30+ проектов, 100% решений ГЗК. Гарантия в договоре.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --bg:#f2f3f7; --white:#fff; --soft:#f5f6fb;
    --navy:#36187d; --navy2:#2a1366; --blue:#35b8fc; --blue2:#16a6ef;
    --ink2:#6d758d; --ink3:#9aa0b4; --line:#e8eaf2; --line2:#dfe2ee;
    --teal:#6ac9c8; --gold:#f2b705;
    --r:20px; --r-lg:30px; --r-sm:12px; --wrap:1240px;
    --sans:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --sh:0 6px 26px rgba(54,24,125,.08); --sh-h:0 16px 44px rgba(54,24,125,.15);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--navy);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  .wrap{width:100%;max-width:var(--wrap);margin:0 auto;padding:0 24px}
  @supports(padding:max(0px)){.wrap{padding-left:max(24px,env(safe-area-inset-left));padding-right:max(24px,env(safe-area-inset-right))}body{padding-bottom:env(safe-area-inset-bottom)}}
  h1,h2,h3,h4{margin:0;font-weight:800;line-height:1.07;letter-spacing:-.02em;color:var(--navy)}
  h1{font-size:clamp(34px,5vw,60px)}
  .heroh1 span{display:inline}
  @media(min-width:900px){.heroh1 span{display:block}}
  h2{font-size:clamp(28px,3.6vw,44px)}
  h3{font-size:21px}
  p{margin:0 0 15px}
  .eyebrow{font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin:0 0 16px}
  .lede{font-size:clamp(16px,1.9vw,19px);color:var(--ink2);max-width:660px;font-weight:500;text-wrap:pretty}
  p,li,.muted,.b p,.card p,.owul li,details.faq p,.article p{text-wrap:pretty}
  body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .muted{color:var(--ink2);font-weight:500} .ink3{color:var(--ink3)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:inherit;font-weight:700;font-size:15px;border-radius:var(--r-sm);padding:15px 26px;cursor:pointer;border:1.5px solid transparent;transition:all .25s ease;min-height:52px;position:relative}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--blue);color:#fff}
  .btn.primary:hover{background:var(--blue2);box-shadow:0 10px 26px rgba(53,184,252,.35)}
  .btn.ghost{background:var(--white);color:var(--navy);border-color:var(--line2)}
  .btn.ghost:hover{border-color:var(--blue);color:var(--blue2)}
  .btn.bracket::after{content:"";position:absolute;top:7px;right:7px;width:9px;height:9px;border-top:1.5px solid currentColor;border-right:1.5px solid currentColor;opacity:.5}
  /* header */
  header{position:sticky;top:0;z-index:80;background:rgba(255,255,255,.9);backdrop-filter:saturate(150%) blur(14px);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;gap:22px;height:82px}
  .logo{display:flex;align-items:center;gap:11px;flex:0 0 auto}
  .logo .m{width:44px;height:44px;border-radius:11px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;letter-spacing:.02em}
  .logo b{font-size:21px;font-weight:800;color:var(--navy);letter-spacing:.01em;line-height:1}
  .logo small{display:block;font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase;margin-top:3px}
  .menu{display:flex;align-items:center;gap:2px;margin-left:8px}
  .menu>a,.menu .drop>a{padding:11px 14px;border-radius:10px;font-size:14.5px;font-weight:700;color:var(--navy);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:color .2s,background .2s;white-space:nowrap}
  .menu>a:hover,.menu .drop:hover>a{color:var(--blue2);background:var(--soft)}
  .menu>a.on{color:var(--blue2)}
  .nav .right{margin-left:auto;display:flex;align-items:center;gap:16px;flex:0 0 auto}
  .nav .tel{font-weight:800;font-size:16px;color:var(--navy);white-space:nowrap;text-align:center;line-height:1.25}
  .nav .tel small{display:block;font-size:11px;font-weight:600;color:var(--ink3)}
  /* mega menu */
  .drop{position:static}
  .mega{position:absolute;left:0;right:0;top:100%;background:var(--white);border-top:1px solid var(--line);box-shadow:0 30px 50px rgba(54,24,125,.12);opacity:0;visibility:hidden;transform:translateY(6px);transition:.2s;z-index:90}
  .drop:hover .mega{opacity:1;visibility:visible;transform:translateY(0)}
  .mega .in{display:grid;grid-template-columns:repeat(5,1fr) 1.1fr;gap:20px;padding:26px 0 30px;align-items:start}
  .mega .col h4{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin:0 0 12px}
  .mega .col a{display:block;padding:7px 0;font-size:13.5px;font-weight:600;color:var(--ink2);border:0}
  .mega .col a:hover{color:var(--blue2);background:transparent}
  .mega .feat{background:linear-gradient(150deg,var(--navy),#5b3bb0);border-radius:var(--r);padding:22px;color:#fff;display:flex;flex-direction:column;gap:10px;align-self:start}
  .mega .feat h4{color:#fff;font-size:19px;margin:0 0 8px}
  .mega .feat p{color:rgba(255,255,255,.82);font-size:13px}
  
  .drop.closing .mega{opacity:0!important;visibility:hidden!important}
  .burger{display:none;width:50px;height:50px;border:1px solid var(--line2);border-radius:12px;background:var(--white);color:var(--navy);cursor:pointer;font-size:20px}
  /* sections */
  section{padding:80px 0}
  .sec-head{max-width:720px;margin:0 0 42px}
  .grid{display:grid;gap:20px}
  .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
  .card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:28px;box-shadow:var(--sh);transition:transform .25s,box-shadow .25s}
  .card:hover{transform:translateY(-4px);box-shadow:var(--sh-h)}
  .crumbs{font-size:13px;color:var(--ink3);margin-bottom:22px;font-weight:600}
  .crumbs a:hover{color:var(--blue2)}
  /* hero */
  .hero{padding:54px 0 30px}
  .hero .row{display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:center}
  .hero h1{margin-bottom:20px}
  .hero .cta{display:flex;gap:13px;flex-wrap:wrap;margin-top:30px}
  .hero .pic{position:relative;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh);aspect-ratio:4/3.2}
  .hero .pic img{width:100%;height:100%;object-fit:cover}
  .hero .badge{position:absolute;left:18px;bottom:18px;background:rgba(255,255,255,.94);backdrop-filter:blur(6px);border-radius:16px;padding:14px 18px;box-shadow:var(--sh)}
  .hero .badge b{display:block;font-size:26px;font-weight:800;color:var(--blue2);line-height:1}
  .hero .badge span{font-size:12.5px;color:var(--ink2);font-weight:600}
  /* trust */
  .trust{padding:18px 0 60px}
  .trust .row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .trust .t{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:24px;text-align:center;box-shadow:var(--sh)}
  .trust .t.hl{background:linear-gradient(150deg,var(--blue),#1f93e6);border:0}
  .trust .t b{display:block;font-size:clamp(28px,3.4vw,40px);font-weight:800;color:var(--navy);line-height:1}
  .trust .t.hl b,.trust .t.hl span{color:#fff}
  .trust .t span{font-size:13px;color:var(--ink2);font-weight:600}
  /* direction cards */
  .gcard{display:block;background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:30px;box-shadow:var(--sh);transition:transform .25s,box-shadow .25s}
  .gcard:hover{transform:translateY(-5px);box-shadow:var(--sh-h)}
  .gcard .ic{width:58px;height:58px;border-radius:15px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;background:color-mix(in srgb,var(--c) 14%,#fff);color:var(--c)}
  .gcard h3{margin-bottom:10px}
  .gcard p{color:var(--ink2);font-size:14.5px;margin-bottom:16px;font-weight:500}
  .gcard .cnt{font-size:13.5px;font-weight:800;color:var(--blue2)}
  /* service card */
  .scard{display:flex;flex-direction:column;background:var(--white);border:1px solid var(--line);border-radius:var(--r-sm);padding:22px;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;border-top:3px solid var(--c)}
  .scard:hover{transform:translateY(-3px);box-shadow:var(--sh-h)}
  .scard h4{font-size:16px;margin-bottom:7px}
  .scard p{color:var(--ink2);font-size:13.5px;margin:0 0 14px;font-weight:500}
  .scard .more{margin-top:auto;font-size:13px;font-weight:800;color:var(--blue2)}
  .price{color:var(--navy);font-weight:800;font-size:13.5px}
  /* lists */
  .ulist{list-style:none;padding:0;margin:0 0 24px}
  .ulist li{padding:13px 0 13px 30px;border-bottom:1px solid var(--line);position:relative;color:var(--ink2);font-weight:500}
  .ulist li::before{content:"";position:absolute;left:2px;top:20px;width:10px;height:10px;border-radius:50%;background:var(--blue)}
  /* cases */
  .case{background:var(--white);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:transform .25s,box-shadow .25s}
  .case:hover{transform:translateY(-4px);box-shadow:var(--sh-h)}
  .case .ph{aspect-ratio:16/10;overflow:hidden}
  .case .ph img{width:100%;height:100%;object-fit:cover}
  .case .b{padding:24px}
  .case .res{color:var(--blue2);font-weight:800;font-size:16px;margin:6px 0 0}
  .case .meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:12.5px;color:var(--ink3);font-weight:600}
  /* form */
  form.lead{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:30px;box-shadow:var(--sh)}
  .fld{margin-bottom:16px}
  .fld label{display:block;font-size:13px;font-weight:700;margin-bottom:7px;color:var(--navy)}
  .fld input,.fld select{width:100%;background:var(--soft);border:1.5px solid var(--line2);border-radius:12px;padding:14px;color:var(--navy);font-size:16px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
  .fld input:focus,.fld select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(53,184,252,.18);background:#fff}
  .fld input.bad,.fld select.bad{border-color:#e5484d}
  .err{color:#e5484d;font-size:12.5px;margin-top:6px;display:none}.err.show{display:block}
  .agree{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--ink2);cursor:pointer;font-weight:500}
  .agree input{width:18px;height:18px;margin-top:2px;flex:0 0 auto;accent-color:var(--blue)}
  .agree a{color:var(--blue2);text-decoration:underline}
  .hp{position:absolute;left:-9999px}
  .formnote{font-size:12px;color:var(--ink3);margin-top:13px;font-weight:500}
  .okmsg{background:#eaf9f1;border:1px solid #b6e6cd;color:#1c7a4d;border-radius:12px;padding:16px;font-size:14px;display:none;font-weight:600} .okmsg.show{display:block}
  details.faq{background:var(--white);border:1px solid var(--line);border-radius:var(--r-sm);padding:0 20px;margin-bottom:12px;box-shadow:var(--sh);transition:box-shadow .2s}
  details.faq[open]{box-shadow:var(--sh-h)}
  details.faq summary{list-style:none;cursor:pointer;font-weight:700;color:var(--navy);padding:18px 0;display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:15.5px}
  details.faq summary::-webkit-details-marker{display:none}
  details.faq summary::after{content:"+";color:var(--blue2);font-size:22px;font-weight:700;flex:0 0 auto;transition:transform .2s}
  details.faq[open] summary::after{content:"\2212"}
  details.faq p{color:var(--ink2);margin:0 0 18px;font-size:14.5px;font-weight:500}
  .article h3{font-size:22px;margin:26px 0 10px;color:var(--navy)}
  .article p{font-size:16px;color:var(--ink2);margin:0 0 16px;line-height:1.7}
  .chips{display:flex;flex-wrap:wrap;gap:12px}
  .chip{display:inline-flex;align-items:center;background:var(--white);border:1px solid var(--line);border-radius:999px;padding:11px 20px;font-weight:700;font-size:14.5px;color:var(--navy);box-shadow:var(--sh);white-space:nowrap}
  .clogos{display:flex;flex-wrap:wrap;gap:18px 40px;align-items:center;justify-content:center;padding:26px 28px;background:var(--white);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
  .clogo{font-weight:800;font-size:clamp(15px,2.2vw,20px);letter-spacing:.02em;color:#8a90a6;filter:grayscale(1);opacity:.75;transition:opacity .2s,color .2s}
  .clogo:hover{opacity:1;color:var(--navy)}
  .onewin{background:linear-gradient(180deg,#fff,var(--soft))}
  .funnel{max-width:840px;margin:0 auto;text-align:center}
  .fchips{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
  .fchip{background:var(--white);border:1px solid var(--line);border-radius:999px;padding:10px 18px;font-weight:700;font-size:13.5px;color:var(--navy);box-shadow:var(--sh)}
  .farrow{margin:14px 0;display:flex;align-items:center;justify-content:center}
  .farrow span{color:var(--ink3);font-size:12.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;position:relative;padding:0 30px}
  .farrow span::before,.farrow span::after{content:"";position:absolute;top:50%;width:22px;height:1px;background:var(--line)}
  .farrow span::before{left:0}.farrow span::after{right:0}
  .farrow.farr2{height:22px}
  .farrow.farr2::after{content:"↓";color:var(--blue2);font-size:20px;font-weight:800}
  .fhub{background:linear-gradient(135deg,var(--navy),#5a3ad6);color:#fff;border-radius:var(--r);padding:30px 26px;box-shadow:var(--sh-h)}
  .fhub b{font-size:clamp(21px,3.2vw,28px);display:block;margin-bottom:8px}
  .fhub span{opacity:.92;font-size:14.5px;line-height:1.6}
  .fout{margin-top:16px;font-weight:800;color:var(--navy);font-size:clamp(17px,2.6vw,22px)}
  .owlist{max-width:940px;margin:36px auto 0;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .owitem{display:flex;gap:14px;align-items:flex-start;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--sh)}
  .owitem .oic{flex:0 0 auto;width:44px;height:44px;border-radius:12px;background:color-mix(in srgb,var(--blue) 14%,#fff);color:var(--blue2);display:flex;align-items:center;justify-content:center}
  .owitem b{display:block;color:var(--navy);font-size:15px;margin-bottom:3px}
  .owitem p{margin:0;color:var(--ink2);font-size:13.5px;line-height:1.55}
  @media(max-width:760px){.owlist{grid-template-columns:1fr}.fchips{gap:8px}.fchip{font-size:12.5px;padding:8px 14px}}
  .owinset{display:grid;grid-template-columns:1fr 1fr;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh);background:var(--white);border:1px solid var(--line)}
  .owpic{min-height:330px}
  .owpic img{width:100%;height:100%;object-fit:cover;display:block}
  .owtext{padding:42px}
  .owul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:11px}
  .owul li{position:relative;padding-left:32px;color:var(--ink2);font-size:14.5px;font-weight:500;line-height:1.45}
  .owul li::before{content:"\2713";position:absolute;left:0;top:1px;width:21px;height:21px;border-radius:50%;background:color-mix(in srgb,var(--green) 16%,#fff);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  @media(max-width:860px){.owinset{grid-template-columns:1fr}.owpic{min-height:210px}.owtext{padding:28px}}
  .cbtn{position:fixed;right:20px;bottom:20px;z-index:70;background:var(--blue);color:#fff;border:0;border-radius:999px;padding:15px 22px;font-family:var(--sans);font-weight:800;font-size:14.5px;cursor:pointer;box-shadow:0 12px 30px rgba(53,184,252,.4);display:inline-flex;align-items:center;gap:9px}
  .cbtn:hover{background:var(--blue2)}
  @supports(padding:max(0px)){.cbtn{bottom:max(20px,env(safe-area-inset-bottom))}}
  .cback{position:fixed;inset:0;z-index:90;background:rgba(15,17,22,.5);display:none;align-items:center;justify-content:center;padding:20px}
  .cback.open{display:flex}
  .cmodal{background:var(--white);border-radius:var(--r);max-width:420px;width:100%;padding:28px;box-shadow:var(--sh-h);position:relative}
  .cmodal .x{position:absolute;top:14px;right:16px;background:transparent;border:0;font-size:24px;color:var(--ink3);cursor:pointer;line-height:1}
  @media(max-width:760px){.cbtn{padding:13px 18px;font-size:13.5px}}
  .lthumb{height:200px;overflow:hidden;background:#eef0f7;border-bottom:1px solid var(--line)}
  .lthumb img{width:100%;height:100%;object-fit:cover;object-position:top}
  .card.letter:hover{transform:translateY(-4px);box-shadow:var(--sh-h)}
  .lbox{position:fixed;inset:0;z-index:95;background:rgba(15,17,22,.85);display:none;align-items:center;justify-content:center;padding:24px}
  .lbox.open{display:flex}
  .lbox img{max-width:min(720px,92vw);max-height:88vh;border-radius:12px;box-shadow:0 24px 70px rgba(0,0,0,.55)}
  .lbox .x{position:absolute;top:18px;right:22px;background:#fff;border:0;width:44px;height:44px;border-radius:50%;font-size:24px;cursor:pointer;color:var(--navy);line-height:1}
  #keomap{height:440px;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--line);z-index:0}
  .keopin-dot{width:22px;height:22px;border-radius:50%;background:var(--blue);border:3px solid #fff;box-shadow:0 0 0 7px rgba(53,184,252,.22),0 4px 12px rgba(0,0,0,.25)}
  .leaflet-popup-content{font-family:var(--sans);font-size:13.5px;color:var(--navy);line-height:1.5}
  .leaflet-popup-content b{color:var(--navy)}
  .leaflet-container{font-family:var(--sans)}
  @media(max-width:760px){#keomap{height:340px}}
  /* band */
  .band{background:linear-gradient(135deg,var(--navy),#5b3bb0);border-radius:var(--r-lg);padding:54px 44px;text-align:center;color:#fff}
  .band h2{color:#fff;margin-bottom:12px} .band p{color:rgba(255,255,255,.85);max-width:560px;margin:0 auto 24px;font-weight:500}
  .band .btn.primary{background:#fff;color:var(--navy)} .band .btn.primary:hover{background:#eef}
  /* footer */
  footer{background:var(--white);border-top:1px solid var(--line);padding:60px 0 36px}
  .fgrid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:30px;margin-bottom:38px}
  .fcol h4{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);font-weight:800;margin:0 0 14px}
  .fcol a{display:block;color:var(--ink2);font-size:13.5px;padding:13px 0;font-weight:600;line-height:1.4}
  .fcol a:hover{color:var(--blue2)}
  .fbot{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-top:24px;border-top:1px solid var(--line);color:var(--ink3);font-size:12.5px;font-weight:600}
  /* mobile */
  @media(max-width:980px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}.mega .in{grid-template-columns:repeat(2,1fr)}.mega .feat{display:none}}
  @media(max-width:760px){
    .menu{position:fixed;inset:82px 0 auto 0;flex-direction:column;align-items:stretch;background:#fff;border-bottom:1px solid var(--line);padding:14px;gap:2px;transform:translateY(-150%);transition:transform .25s;max-height:84vh;overflow:auto;margin:0}

const TYPO_SHORT={"в":1,"к":1,"с":1,"о":1,"и":1,"а":1,"у":1,"по":1,"на":1,"за":1,"до":1,"от":1,"из":1,"не":1,"но":1,"же":1,"то":1,"во":1,"со":1,"об":1,"да":1,"я":1,"мы":1,"вы":1,"их":1,"им":1};
function typoStr(t){
  if(!t||t.indexOf(' ')<0) return t;
  var NB='\u00A0';
  try{
    t=t.replace(/(^|[\s(«"])([А-Яа-яЁё]{1,3}) /g,function(m,pre,w){return TYPO_SHORT[w.toLowerCase()]? pre+w+NB : m;});
    t=t.replace(/(^|[\s(«"])(м|г|ул|д|стр|корп|оф|пр|пер|вл|пом)\. /g,'$1$2.'+NB);
    t=t.replace(/№ /g,'№'+NB);
    t=t.replace(/(\d) (?=[А-Яа-яЁёA-Za-z%])/g,'$1'+NB);
  }catch(e){}
  return t;
}
function typoNodes(root){
  if(!root||!document.createTreeWalker) return;
  var w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode:function(n){
    var p=n.parentNode; if(!p) return NodeFilter.FILTER_REJECT;
    var tag=p.nodeName; if(tag==='SCRIPT'||tag==='STYLE'||tag==='CODE'||tag==='PRE'||tag==='TEXTAREA') return NodeFilter.FILTER_REJECT;
    if(!n.nodeValue||!n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
    return NodeFilter.FILTER_ACCEPT;
  }});
  var nodes=[],n; while(n=w.nextNode()) nodes.push(n);
  nodes.forEach(function(n){ var v=typoStr(n.nodeValue); if(v!==n.nodeValue) n.nodeValue=v; });
}

/* ===== ФОРМА ===== */
function wireForm(){
  const f=document.getElementById('leadform'); if(!f) return;
  const name=document.getElementById('f-name'),phone=document.getElementById('f-phone'),agree=document.getElementById('f-agree'),
        submit=document.getElementById('f-submit'),note=document.getElementById('f-note'),ok=document.getElementById('f-ok');
  const eN=document.getElementById('e-name'),eP=document.getElementById('e-phone');
  note.textContent=FORM_ENDPOINT?'':'Демо-режим: проверка полей работает, заявка пока не уходит. Впишите адрес Formspree в Настройках панели.';
  const okPhone=()=>phone.value.replace(/\D/g,'').length>=10, okName=()=>name.value.trim().length>=2;
  function mark(el,e,good){el.classList.toggle('bad',!good);e.classList.toggle('show',!good);}
  function refresh(){submit.disabled=!(okName()&&okPhone()&&agree.checked);submit.style.opacity=submit.disabled?.55:1;}
  [name,phone].forEach(el=>el.addEventListener('input',refresh));
  name.addEventListener('blur',()=>mark(name,eN,okName()));phone.addEventListener('blur',()=>mark(phone,eP,okPhone()));
  agree.addEventListener('change',refresh); refresh();
  f.addEventListener('submit',async e=>{e.preventDefault();mark(name,eN,okName());mark(phone,eP,okPhone());
    if(!(okName()&&okPhone()&&agree.checked)){refresh();return;}
    if(f._gotcha&&f._gotcha.value)return;
    submit.disabled=true;submit.textContent='Отправляем…';
    if(!FORM_ENDPOINT){setTimeout(()=>{ok.classList.add('show');f.reset();submit.textContent='Отправить заявку';note.textContent='Это демо. В рабочей версии заявка ушла бы на почту компании.';},700);return;}
    try{const r=await fetch(FORM_ENDPOINT,{method:'POST',headers:{Accept:'application/json'},body:new FormData(f)});
      if(r.ok){location.hash='#/spasibo';}else{note.textContent='Что-то пошло не так. Позвоните нам или напишите в Telegram.';submit.disabled=false;submit.textContent='Отправить заявку';}
    }catch(_){note.textContent='Нет связи. Проверьте интернет или позвоните нам.';submit.disabled=false;submit.textContent='Отправить заявку';}});
}

function initMap(){
  if(!window.L)return;const el=document.getElementById('keomap');if(!el||el._init)return;el._init=true;
  const lat=55.70258,lon=37.69617;
  const map=L.map(el,{scrollWheelZoom:false,attributionControl:true}).setView([lat,lon],16);
  map.attributionControl.setPrefix(false);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© OpenStreetMap, © CARTO'}).addTo(map);
  const icon=L.divIcon({className:'keopin',html:'<div class="keopin-dot"></div>',iconSize:[22,22],iconAnchor:[11,11]});
  L.marker([lat,lon],{icon:icon}).addTo(map).bindPopup('<b>KEO GROUP</b><br>2-й Южнопортовый проезд, 20А стр.4<br>+7 499 647-75-66').openPopup();
  setTimeout(function(){map.invalidateSize();},200);
}
